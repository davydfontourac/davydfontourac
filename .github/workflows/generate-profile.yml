name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    paths:
      - "config.yml"
      - "generator/**"

jobs:
  generate:
    name: Generate galaxy profile assets
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ADICIONE ESTE BLOCO
      - name: Test private repository access
        env:
          GH_PROFILE_TOKEN: ${{ secrets.GH_PROFILE_TOKEN }}
        run: |
          if [ -z "$GH_PROFILE_TOKEN" ]; then
            echo "::error::O secret GH_PROFILE_TOKEN está vazio ou não existe."
            exit 1
          fi

          RESPONSE=$(curl --silent --fail-with-body \
            -H "Authorization: Bearer $GH_PROFILE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/repos?visibility=all&affiliation=owner&per_page=100")

          echo "$RESPONSE" | python -c '
          import json
          import sys

          repos = json.load(sys.stdin)
          publicos = [repo for repo in repos if not repo["private"]]
          privados = [repo for repo in repos if repo["private"]]

          print(f"Total encontrado pelo token: {len(repos)}")
          print(f"Repositórios públicos: {len(publicos)}")
          print(f"Repositórios privados: {len(privados)}")

          print("\nRepositórios acessíveis:")
          for repo in repos:
              visibility = "PRIVADO" if repo["private"] else "PÚBLICO"
              print(f"- {repo['name']} [{visibility}]")

          if not privados:
              print("::error::O token não encontrou nenhum repositório privado.")
              sys.exit(1)
          '

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROFILE_TOKEN }}
        run: python -m generator.main

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/generated/

          if ! git diff --staged --quiet; then
            git commit -m "chore: update profile SVGs [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected"
          fi
